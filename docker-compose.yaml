  # DEBEZIUM CONNECT
  connect:
    image: quay.io/debezium/connect:3.5.1
    container_name: connect
    ports:
      - 8083:8083
    volumes:
      - ./connectors:/usr/share/java/external_connectors:ro
    depends_on:
      postgres-src:
        condition: service_healthy
      postgres-dst:
        condition: service_healthy
      broker:
        condition: service_started
    environment:
      - BOOTSTRAP_SERVERS=broker:9095
      - GROUP_ID=connect-group
      - CONFIG_STORAGE_TOPIC=connect-config
      - OFFSET_STORAGE_TOPIC=connect-offset
      - STATUS_STORAGE_TOPIC=connect-status
      - CONFIG_STORAGE_REPLICATION_FACTOR=1
      - OFFSET_STORAGE_REPLICATION_FACTOR=1
      - STATUS_STORAGE_REPLICATION_FACTOR=1
      - KEY_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - VALUE_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - REST_ADVERTISED_HOST_NAME=connect
      - PLUGIN_DISCOVERY=hybrid_fail
      # - KAFKA_CONNECT_PLUGIN_PATH=/usr/share/java/external_connectors